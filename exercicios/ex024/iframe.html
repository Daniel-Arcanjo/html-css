<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Teste</title>
    <style>
        /* O style comanda o tamanho do iframe */
        iframe {
            width: 600px;
        }
    </style>
</head>
<body>
    <h1>Utilizando um iframe</h1>
    <p>Este site 
        <!-- O tamanho padrão do iframe é 300 width e 150 height -->
        <iframe src="https://www.autodraw.com/" frameborder="0" height="400px" width="500px">
            <a href="https://www.autodraw.com/" target="_blank"> AutoDraw</a>
        </iframe>
        
        é muito prático para desenhos.</p>
</body>
</html>
