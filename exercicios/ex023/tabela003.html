<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <STYle>
        body
             {
                font-family: Arial, Helvetica, sans-serif;
             }

             table {
                width: 400px;
                 border-collapse: collapse;
             }

             td {
                padding: 8px;
                border: 2px solid black;
             }
    </STYle>
</head>
<body>
    <h1>Mesclagem de Células</h1>
    <table>
        <tr>
            <td colspan="3" style="text-align: center;">A</td>
            
        </tr>
        <tr>
            <td rowspan="2">D</td>
            <td>E</td>
            <td>F</td>
        </tr>
        <tr>
           
            <td>H</td>
            <td rowspan="2">I</td>
        </tr>
        <tr>
           
            <td colspan="2">K</td>
            
        </tr>
    </table>
</body>
</html>
