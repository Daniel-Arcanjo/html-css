<!DOCTYPE html>
<html lang="ptbr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>

    <style>
        table {
            width: 500px;
            height: 600px;
            border-collapse: collapse;
        }

        td {
            border: 2px solid black;
            text-align: center;
            vertical-align: bottom;
        }
    </style>
</head>
<body>
    <h1>Minha primeira tabela</h1>
    <!-- HIERARQUIA DE TABELAS (simples)
     <TABLE> = tabela
        <TABLE ROW> = linha de tabela
            TABLE DATA = dado de tabela
            TABLE HEADER = cabeçalho de tabela
    -->
    <table>
        <tr>
            <td>001</td>
            <td>002</td>
            <td>003</td>
        </tr>
        <tr>
            <td>112</td>
            <td>113</td>
            <td>114</td>
        </tr>
        <tr>
            <td>224</td>
            <td>226</td>
            <td>228</td>
        </tr>
        <tr>
            <td>448</td>
            <td>452</td>
            <td>895</td>
        </tr>
    </table>
</body>
</html>
