<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexibe</title>
    <style>
        div.container {
            display: flex;
            /* flex-direction: row;
            flex-wrap: wrap-reverse; */
            height: 60px;
            background-color: darkblue;
            flex-flow: column wrap;
        }

        div.item {
            flex: auto;
            text-align: center;
            background-color: aqua;
            border: 1px solid black;
            padding: 5px;
        }
    </style>
</head>
<body style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">
    <div class="container">
        <div class="item">Exemplo de A</div>
        <div class="item">Exemplo de B</div>
        <div class="item">Exemplo de C</div>
        <div class="item">Exemplo de D</div>
        <div class="item">Exemplo de E</div>
        <div class="item">Exemplo de F</div>
    </div>
</body>
</html>
