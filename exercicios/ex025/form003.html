<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Teste de Formulário</h1>
    <form action="cadastro.php" method="get">

        <p>
            <label for="ialuno">Aluno:</label>
        <input type="text" name="aluno" id="ialuno" required placeholder="Nome Completo" maxlength="30" size="30">
        </p>

        <p>
            <label for="imedia">Média:</label>
            <input type="number" name="media" id="imedia" required placeholder="0 à 10" step="0.1" min="0" max="10">
        </p>

        <p>
            <label for="iperiodo">Período Letivo:</label>
            <input type="month" name="periodo" id="iperiodo" required>
        </p>

        <p>
            <label for="idata">Data:</label>
            <input type="date" name="data" id="idata" required>
        </p>

        <p>
            <label for="ihorario">Horário:</label>
            <input type="time" name="horario" id="ihorario">
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

    </form>
</body>
</html>
