<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif;">
    <h1>Exemplo de Formulário</h1>
    <h2>Tag: input-color <br> input-rage <br> input-file</h2>
    <form action="cadastro.php" method="post">
        <!-- IMPORTANTE: Ao adicionar um INPUT-FILE é necessário colocar "POST" METHOD="post" -->
        <p>
            <label for="icor">Cor:</label>
            <input type="color" name="cor" id="icor">
        </p>

        <p>
            <label for="inivel">Nível de Satisfação:</label> <input type="range" name="nivel" id="inivel" min="0" max="5" value="3">
        </p>

        <p>
            <label for="ifoto">Foto de Perfil:</label>
            <input type="file" name="foto" id="ifoto">
        </p>

        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </form>
</body>
</html>
