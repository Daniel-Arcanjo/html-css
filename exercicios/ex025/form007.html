<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Formulários com listas</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
        <!-- Colocar POST (por causa da "MSG" tem um limite de 3mil palavras o GET) -->

        <p>
            <label for="ient">Entretenimento</label>
            <select name="ent" id="ient">
                <option value="" selected>---ESCOLHA---</option>
                <optgroup label="filmes">
                    <option value="IN">Inception</option>
                    <option value="BH">Big Hero</option>
                    <option value="MA">Matilda</option>
                </optgrup>

                <optgroup label="series">
                    <option value="MR">Mr. Robot</option>
                    <option value="ST">Stranger Things</option>
                    <option value="OT">Once Upon a Time</option>
                </optgroup>

            </select>
        </p>

        <p>
            <label for="iprofissao">Profissão:</label>
            <input type="text" name="profissao" id="iprofissao" list="listaprofissao">
            <datalist id="listaprofissao">
                <option>Médico</option>
                <option>Professor</option>
                <option>Desenvolvedor</option>
                <option>Dentista</option>
                <option>Advogado</option>
            </datalist>

        </p>

        <p>
            <label for="imsg">Mensagem</label> <br>
            <textarea name="" id="" cols="30" rows="10"></textarea>
        </p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </form>
</body>
</html>
