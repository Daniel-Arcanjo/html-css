<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif;">
    <h1>Exemplo de checkbox</h1>
    <form action="cadastro.php" method="get">
        <fieldset>
            <!-- Aqui deve COLOCAR O MESMO "NAME" (pois assim será possível mudar a marcação)
            Diferente se checkbox, no INPUT-RADIO só é possível marcar 1-->
            <legend>Sexo</legend>
            <input type="radio" name="sexo" id="mas" value="M" checked> <label for="mas">Masculino</label>
            <br>
            <input type="radio" name="sexo" id="fem" value="F"><label for="fem">Feminino</label>
        </fieldset>
        <fieldset>
            <legend>Espostes Favoritos</legend>

            <p>
                <input type="checkbox" name="fut" id="ifut"> <label for="ifut">Futebol</label> <br>
                
                <input type="checkbox" name="bas" id="ibas"> <label for="ibas">Basquete</label>
            <br>
                <input type="checkbox" name="nat" id="inat" checked> <label for="inat">Natação</label>
            <br>
                <input type="checkbox" name="ten" id="iten"> <label for="iten">Tenis</label>
            <br>
                <input type="checkbox" name="box" id="ibox"> <label for="ibox">Boxe</label>
            </p>
        </fieldset>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </form>
</body>
</html>
