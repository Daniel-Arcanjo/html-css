<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente</title>
    <style>
        * { /* Configurações globais das CSS */
            height: 100%;
        }
        body {
            background-image: linear-gradient(to bottom, #7d1fefc1 10%, #DF20A9, #F4442E, #f4b50892);
            background-attachment: fixed;
            /* Esse fixed é para o degradê continuar até o fim da tela */
        }
    </style>
</head>
<body>
    <h1>Testando gradiente / degradê</h1>
</body>
</html>
