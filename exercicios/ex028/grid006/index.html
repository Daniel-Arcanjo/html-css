<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid for Items</title>
    <style>
        div.container {
            display: grid;
            background-color: aliceblue;
            border: 2px solid black;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: repeat(3, 150px);
        }

        /*
            Simplificação total!
            GRID AREA - ordem para declarar
             linha inicial / coluna inicial / linha final / coluna final
        */

        div.caixa1 {
            border: 1px solid green;
            grid-area: 1/1/2/-1;
        }

        div.caixa2 {
            border: 1px solid green;
            grid-area: 2 / 1 / -1 / 3;
        }

        div.caixa3 {
            border: 1px solid green;
            grid-area: 2 / 3 / -1 / -1;
        }
        /*Pode usar 'SPAN' significa expansão, ou  seja, se eu colocar: 
         Grid Area: 1 / 1 / span 2 / span 4
         significa que, foi a primeira linha, mais uma expansão de 2, logo, 3 linhas. A coluna fica 1 + 4, logo, coluna 5.
        */
    </style>
</head>
<body>
    <div class="container">
        <div class="caixa1">
            Daniel
        </div>
        <div class="caixa2">
            Arcanjo
        </div>
        <div class="caixa3">
            Ferreira
        </div>
    </div>
</body>
</html>
