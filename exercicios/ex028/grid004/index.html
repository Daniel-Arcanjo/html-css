<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid for Items</title>
    <style>
        div.container {
            display: grid;
            background-color: aliceblue;
            border: 2px solid black;
            height: 451px;
            width: 500px;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: repeat(3, 150px);
        }

        div.caixa1 {
            border: 1px solid green;
            grid-row-start: 1;
            grid-row-end: 2;
            grid-column-start: 1;
            grid-column-end: 4;
        }

        div.caixa2 {
            border: 1px solid green;
            grid-row-start: 2;
            grid-row-end: 4;
            grid-column-start: 1;
            grid-column-end: 3;
        }

        div.caixa3 {
            border: 1px solid green;
            grid-row-start: 2;
            grid-row-end: 4;
            grid-column-start: 3;
            grid-column-end: 4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="caixa1">
            Daniel
        </div>
        <div class="caixa2">
            Arcanjo
        </div>
        <div class="caixa3">
            Ferreira
        </div>
    </div>
</body>
</html>
