<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Hover</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        div > p{
            display: none;
        }
        div:hover > p{
            display: block;
            background-color: red;
            color: aliceblue;
            width: 250px;
        }
        div:hover{
            color: rgb(255, 0, 0);
        }
    </style>
</head>
<body>
    <h1>Exemplo de como utilizar hover</h1>
<p>Passe o mouse sobre o texto abaixo</p>
<div id="teste">
    Passe o mouse aqui
    <p>TEXTO ESCONDIDO...
        <img src="mundo-vermelho-full.jpg" alt="img">
    </p>
</div>
<p>Fim do Exemplo.</p>
</body>
</html>
