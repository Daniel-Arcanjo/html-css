<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-Classe</title>
    <style>
        div{
            background-color: rgb(163, 163, 163);
            text-align: center;
            height: 200px;
            width: 200px;
            display: inline-block;
            border: solid 1px rgb(0, 0, 0);
        }
        div:hover{
            background-color: red;
        }
    </style>
</head>
<body>
    <div>01</div>
    <div>02</div>
    <div>03</div>
</body>
</html>
