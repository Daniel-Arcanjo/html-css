<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>

    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
        }

        td, th {
            border: 2px solid black;
            padding: 10px;
        }

        th {
            background-color: gray;
            color: white;
            font-weight: bolder;
        }

        th.normal {
            background-color: white;
            color: black;
        }

        td.th {
            background-color: gray;
            color: white;
            font-weight: bolder;
        }
    </style>

</head>
<body>
    <h1>Desafio de Tabelas Parte 2</h1>

    <table>
        <thead>
            <tr>
                <th rowspan="2" scope="col">Área</th>
                <th rowspan="2" scope="col">Disciplinas</th>
                <th colspan="2" scope="colgroup">Notas</th>
                <th rowspan="2" scope="col">Média</th>
            </tr>
            <tr>
                <th scope="col">Nota 1</th>
                <th scope="col">Nota 2</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <th rowspan="4" class="normal">Exatas</th>
                <td>Matemática</td>
                <td>10.0</td>
                <td>10.0</td>
                <td>10.0</td>
            </tr>
            <tr>
                <td>Física</td>
                <td>8.0</td>
                <td>8.5</td>
                <td>8.2</td>
            </tr>
            <tr>
                <td>Química</td>
                <td>9.0</td>
                <td>8.5</td>
                <td>8.8</td>
            </tr>
            <tr>
                <td>Biologia</td>
                <td>9.0</td>
                <td>7.0</td>
                <td>8.0</td>
            </tr>
            <tr>
                <th colspan="4" scope="row" style="text-align: left;">Média de Exatas</th>
                <td class="th">9.0</td>
            </tr>
            <tr>
                <th rowspan="2" class="normal">Humanas</th>
                <td>História</td>
                <td>7.0</td>
                <td>7.5</td>
                <td>7.2</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td>7.0</td>
                <td>8.0</td>
                <td>7.5</td>
            </tr>
            <tr>
                <th colspan="4" scope="row" style="text-align: left;">Média de Humanas</th>
                <td class="th">7.4</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
